<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

        rel="stylesheet">
    <title>starbucks</title>
</head>

<body>
    <div class="circulo"></div>
    <img src="img/logo.png" alt="imagem-logo-starbucks">


    <div class="conteudo">

            </p> <button>clique aqui</button>
        </div>
        <div class="caixa-imagem">
            <img class="Starbucks" src="img/img1.png" alt="imagem-copo-starbucks">
        </div>
    </div>
    <div class="menu">

        <img src="img/thumb1.png" class="botao-menu" onclick="trocaImagem('img/img1.png');trocaFundo('#017143')">


        <img src="img/thumb2.png" class="botao-menu" onclick="trocaImagem('img/img2.png');trocaFundo('#eb7495')">


        <img src="img/thumb3.png" class="botao-menu" onclick="trocaImagem('img/img3.png');trocaFundo('#d752b1')">


    </div>

</body>
<script src="scripts.js">


</script>

</html>
